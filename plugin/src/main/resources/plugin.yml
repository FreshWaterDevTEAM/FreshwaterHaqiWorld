name: FreshwaterHaqiWorld
version: '${version}'
main: com.freshwater.haqiworld.plugin.FreshwaterHaqiWorldPlugin
api-version: '1.21'
author: Freshwater Island Dev Group
description: Haqi World Survival - Paper server plugin. Fight with microphone haqi sonic booms.
depend: [voicechat]
commands:
  haqi:
    description: Haqi give / leaderboard / unlock / debug / clear / giveall
    usage: /haqi <give|giveall|clear|top|unlock|debug|status>
    permission: fhw.command
permissions:
  fhw.command:
    description: Use /haqi (top/status/debug)
    default: true
  fhw.unlock:
    description: Unlock haqi tiers via command
    default: op
  fhw.give:
    description: Give haqi items to self or all players
    default: op
  fhw.clear:
    description: Clear haqi items and reset unlock to basic
    default: op
