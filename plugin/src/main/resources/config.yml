# Very low floor: any real mic activity can fire; damage/range scale with loudness 0→1.
haqi-volume-threshold: 0.04
haqi-reference-level: 0.10
# Maps mic samples into 0..1 (higher = easier to reach full power)
loudness-gain: 2.5
# Keep false — dynamic scaling needs real loudness, not a flat boost
voice-activation-boost: false
voice-activation-min-loudness: 0.55
require-haqi-item: true
remove-melee-combat: true
enable-debug-keybind: true
debug-keybind-loudness: 1.0
mobs-can-haqi: true
mob-haqi-cooldown-ticks: 60
mob-haqi-damage: 6.0
leaderboard-size: 10

resource-pack:
  enabled: false
  url: "https://github.com/FreshWaterDevTEAM/FreshwaterHaqiWorld/releases/download/v2.0.6/fhw-resourcepack-2.0.6.zip"
  host: ""
  port: 8163
  force: false
