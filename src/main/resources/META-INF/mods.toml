modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description} Client companion — assets + debug keybind. Gameplay runs on the Paper plugin.'''
displayTest="IGNORE_ALL_VERSION"

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="CLIENT"

# Optional: assets/keybinds still load without SVC. SVC versions look like "1.21.11-2.6.20".
[[dependencies.${mod_id}]]
    modId="voicechat"
    mandatory=false
    versionRange="[1.21.11-2.5,)"
    ordering="AFTER"
    side="CLIENT"
